name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Clear all caches
      run: |
        rm -rf ~/.gradle/
        rm -rf ~/.android/
        rm -rf ./gradle/wrapper/*.jar
        rm -rf ./app/build/
        rm -rf ./.gradle/

    - name: Download Gradle Wrapper
      run: |
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar

    - run: chmod +x gradlew
    - run: ./gradlew assembleDebug --refresh-dependencies --no-build-cache

    - uses: actions/upload-artifact@v6
      with:
        name: APK
        path: app/build/outputs/apk/debug/*.apk
