name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Clear all Gradle caches
      run: |
        rm -rf ~/.gradle/
        rm -rf ~/.android/
        rm -rf ./app/build/
        rm -rf ./.gradle/

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'
        cache-disabled: true

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --refresh-dependencies --no-build-cache

    - name: Rename APK for release
      run: |
        VERSION="${GITHUB_REF_NAME:-dev}"
        APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
        cp "$APK_PATH" "app/build/outputs/apk/debug/GlowSelfie-${VERSION}-debug.apk"

    - uses: actions/upload-artifact@v4
      with:
        name: APK
        path: app/build/outputs/apk/debug/GlowSelfie-*-debug.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/GlowSelfie-*-debug.apk
        generate_release_notes: true
