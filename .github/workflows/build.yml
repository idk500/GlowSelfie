name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Clear all caches and jetified files
      run: |
        rm -rf ~/.gradle/
        rm -rf ~/.android/
        rm -rf ./app/build/
        rm -rf ./.gradle/
        find /home -name "*jetified*" -type f -delete 2>/dev/null || true
        find /tmp -name "*jetified*" -type f -delete 2>/dev/null || true

    - run: chmod +x gradlew
    - run: ./gradlew assembleDebug --refresh-dependencies --no-build-cache --no-daemon

    - uses: actions/upload-artifact@v6
      with:
        name: APK
        path: app/build/outputs/apk/debug/*.apk
